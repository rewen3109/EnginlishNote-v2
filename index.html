<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewen的英文學習手帳</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Kalam:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #fdfcf0;
            background-image: radial-gradient(#e5e7eb 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            font-family: 'Gaegu', 'Microsoft JhengHei', cursive;
        }

        .handwritten {
            font-family: 'Kalam', cursive;
        }

        /* 僅保留複習卡片用的紙膠帶 */
        .washi-tape-blue {
            height: 20px;
            width: 80px;
            background: rgba(147, 197, 253, 0.6);
            transform: rotate(3deg);
            position: absolute;
            top: -10px;
            left: 50%;
            margin-left: -40px;
            z-index: 10;
        }

        .flip-card {
            perspective: 1000px;
        }

        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.05);
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        .sketch-button {
            border: 2px solid #4b5563;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            transition: all 0.2s;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #fca5a5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App()
        {
            const [activeTab, setActiveTab] = useState('list');
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [items, setItems] = useState(() =>
            {
                const saved = localStorage.getItem('vocab_data_auto_v3');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() =>
            {
                localStorage.setItem('vocab_data_auto_v3', JSON.stringify(items));
                localStorage.setItem('gemini_api_key', apiKey);
            }, [items, apiKey]);

            const fetchAIAllContent = async (content, type) =>
            {
                if (!apiKey) { alert("請先設定 Gemini Key 哦！"); return null; }
                const prompt = `You are a tutor. For ${type} "${content}": 1. Provide Trad. Chinese meaning. 2. 3 examples with Trad. Chinese translations. 3. 3 distractors. Return JSON: {"meaning": "...", "examples": [{"en": "...", "zh": "..."}, ...], "distractors": ["...", "...", "..."]}`;
                try
                {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) { alert("AI 讀取失敗。"); return null; }
            };

            const addItem = async (content, type) =>
            {
                const aiResult = await fetchAIAllContent(content, type);
                if (aiResult)
                {
                    setItems([...items, { id: Date.now(), content, type, ...aiResult, firstLetter: content.charAt(0).toUpperCase() }]);
                    setActiveTab('list');
                }
            };

            const deleteItem = (id) => { if (confirm("確定要撕掉這一頁嗎？")) setItems(items.filter(i => i.id !== id)); };

            return (
                <div className="max-w-md mx-auto min-h-[90vh] flex flex-col relative">
                    <header className="text-center mb-6 pt-4">
                        <h1 className="text-3xl font-bold text-slate-700 italic">Smart AI Notebook</h1>
                        <p className="text-slate-400 text-sm">~ 記錄學習的每一天 ~</p>
                        <button onClick={() => setApiKey(prompt("Gemini API Key:", apiKey))} className="text-[10px] mt-2 text-slate-400 underline tracking-widest">API SETTINGS</button>
                    </header>

                    <nav className="flex gap-2 px-2 mb-[-2px] z-10">
                        {['list', 'add', 'review'].map(tab => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`px-4 py-2 rounded-t-xl text-sm transition-all ${activeTab === tab ? 'bg-white border-x-2 border-t-2 border-slate-700 font-bold' : 'bg-slate-200 text-slate-500'}`}
                            >
                                {tab === 'list' ? '單字本' : tab === 'add' ? '寫新字' : '小測驗'}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 bg-white border-2 border-slate-700 rounded-xl rounded-tl-none p-6 shadow-[8px_8px_0px_rgba(0,0,0,0.05)]">
                        {activeTab === 'add' && <AddView onAdd={addItem} />}
                        {activeTab === 'list' && <ListView items={items} onDelete={deleteItem} />}
                        {activeTab === 'review' && <ReviewView items={items} />}
                    </main>
                </div>
            );
        }

        // --- 子組件：新增頁面 (已移除頂部紙膠帶) ---
        function AddView({ onAdd })
        {
            const [text, setText] = useState('');
            const [type, setType] = useState('word');
            const [loading, setLoading] = useState(false);

            const handleAdd = async () =>
            {
                if (!text) return;
                setLoading(true);
                await onAdd(text, type);
                setLoading(false);
                setText('');
            };

            return (
                <div className="space-y-6">
                    {/* 紙膠帶已被移除 */}
                    <div className="pt-2">
                        <label className="block text-xs text-slate-400 mb-2 font-bold uppercase tracking-widest">Type Selection</label>
                        <div className="flex gap-4 mb-8">
                            <button onClick={() => setType('word')} className={`flex-1 p-2 rounded-lg border-2 transition-all ${type === 'word' ? 'bg-amber-50 border-slate-700 font-bold' : 'border-slate-100 text-slate-300'}`}>單字</button>
                            <button onClick={() => setType('phrase')} className={`flex-1 p-2 rounded-lg border-2 transition-all ${type === 'phrase' ? 'bg-amber-50 border-slate-700 font-bold' : 'border-slate-100 text-slate-300'}`}>片語</button>
                        </div>

                        <label className="block text-xs text-slate-400 mb-2 font-bold uppercase tracking-widest">English Input</label>
                        <input
                            value={text}
                            onChange={e => setText(e.target.value)}
                            className="w-full border-b-2 border-slate-700 p-2 focus:outline-none handwritten text-3xl text-center placeholder-slate-200"
                            placeholder="Type word..."
                            autoFocus
                        />
                    </div>

                    <div className="pt-4">
                        <button
                            onClick={handleAdd}
                            disabled={loading || !text}
                            className="w-full sketch-button bg-pink-100 p-4 font-bold text-slate-700 flex justify-center items-center gap-3 hover:bg-pink-200 disabled:bg-gray-50 disabled:border-gray-200"
                        >
                            {loading ? <div className="spinner"></div> : "✨ AI 自動生成筆記 ✨"}
                        </button>
                        {loading && <p className="text-center text-xs text-slate-400 mt-4 animate-pulse">正在為您查字典寫例句...</p>}
                    </div>
                </div>
            );
        }

        // --- 子組件：列表顯示 ---
        function ListView({ items, onDelete })
        {
            const sorted = useMemo(() => [...items].sort((a, b) => a.content.localeCompare(b.content)), [items]);
            if (items.length === 0) return <div className="text-center py-20 text-slate-400">目前沒有筆記喔 📒</div>;

            return (
                <div className="space-y-4">
                    {sorted.map(item => (
                        <div key={item.id} className="relative group border-b border-slate-100 pb-3 flex justify-between items-end">
                            <div>
                                <span className="text-[10px] bg-slate-100 text-slate-400 px-1 rounded mr-2 uppercase">{item.type}</span>
                                <div className="handwritten text-2xl font-bold text-slate-700 leading-none mt-1">{item.content}</div>
                                <div className="text-sm text-blue-500 font-bold mt-2">{item.meaning}</div>
                            </div>
                            <button onClick={() => onDelete(item.id)} className="text-slate-200 hover:text-red-400 transition-colors p-2">🗑️</button>
                        </div>
                    ))}
                </div>
            );
        }

        // --- 複習區 ---
        function ReviewView({ items })
        {
            const [mode, setMode] = useState('card');
            if (items.length === 0) return <div className="text-center py-20 text-slate-400 italic">趕快去寫點單字再來練習吧！</div>;
            return (
                <div className="space-y-6">
                    <div className="flex bg-slate-100 p-1 rounded-full text-[10px] font-bold uppercase tracking-tighter">
                        <button onClick={() => setMode('card')} className={`flex-1 py-2 rounded-full ${mode === 'card' ? 'bg-white shadow-sm text-slate-700' : 'text-slate-400'}`}>閃示卡</button>
                        <button onClick={() => setMode('quiz')} className={`flex-1 py-2 rounded-full ${mode === 'quiz' ? 'bg-white shadow-sm text-slate-700' : 'text-slate-400'}`}>拼字題</button>
                    </div>
                    {mode === 'card' ? <Flashcard items={items} /> : <Quiz items={items} />}
                </div>
            );
        }

        function Flashcard({ items })
        {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const current = items[idx];
            return (
                <div className="space-y-6">
                    <div className={`flip-card w-full h-72 ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(!flipped)}>
                        <div className="flip-card-inner w-full h-full relative">
                            <div className="flip-card-front bg-amber-50 border-2 border-slate-700 flex flex-col items-center justify-center p-6 text-center">
                                <div className="washi-tape-blue"></div>
                                <span className="handwritten text-4xl text-slate-800 font-bold">{current.content}</span>
                                <p className="mt-12 text-[10px] text-slate-400 uppercase tracking-widest">Click to reveal</p>
                            </div>
                            <div className="flip-card-back bg-white border-2 border-slate-700 flex flex-col items-center justify-center p-6 overflow-y-auto">
                                <div className="text-2xl font-bold text-blue-600 mb-4 border-b-2 border-blue-100 px-4 pb-1">{current.meaning}</div>
                                <div className="text-left space-y-3">
                                    {current.examples.map((ex, i) => (
                                        <div key={i} className="text-xs">
                                            <p className="text-slate-700 font-medium italic leading-tight">"{ex.en}"</p>
                                            <p className="text-slate-400 mt-1">{ex.zh}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="flex justify-between items-center px-8">
                        <button onClick={() => { setIdx((idx - 1 + items.length) % items.length); setFlipped(false) }} className="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-700 rounded-full shadow-sm active:bg-slate-50">⬅️</button>
                        <span className="text-xs font-bold text-slate-400">{idx + 1} / {items.length}</span>
                        <button onClick={() => { setIdx((idx + 1) % items.length); setFlipped(false) }} className="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-700 rounded-full shadow-sm active:bg-slate-50">➡️</button>
                    </div>
                </div>
            );
        }

        function Quiz({ items })
        {
            const [idx, setIdx] = useState(0);
            const [selected, setSelected] = useState(null);
            const [exIdx, setExIdx] = useState(0);
            const current = items[idx];
            const options = useMemo(() => [current.content, ...current.distractors].sort(() => Math.random() - 0.5), [idx]);
            const sentence = current.examples[exIdx].en.replace(new RegExp(current.content, 'gi'), ' (________) ');

            return (
                <div className="space-y-4">
                    <div className="bg-slate-50 p-6 rounded-2xl border-2 border-slate-100 shadow-inner relative">
                        <p className="handwritten text-xl leading-relaxed text-slate-700 italic">"{sentence}"</p>
                        <p className="text-xs mt-3 text-slate-400 font-bold border-t pt-2">中文意：{current.examples[exIdx].zh}</p>
                    </div>
                    <div className="grid gap-2">
                        {options.map(opt => (
                            <button
                                key={opt}
                                onClick={() => setSelected(opt)}
                                disabled={!!selected}
                                className={`p-4 text-left rounded-xl border-2 font-bold transition-all ${selected === opt ? (opt === current.content ? 'border-green-500 bg-green-50 text-green-700' : 'border-red-500 bg-red-50 text-red-700') : (selected && opt === current.content ? 'border-green-500 bg-green-50' : 'border-slate-100 hover:border-slate-700')}`}
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                    {selected && (
                        <button onClick={() =>
                        {
                            setIdx((idx + 1) % items.length);
                            setSelected(null);
                            setExIdx(Math.floor(Math.random() * 3));
                        }} className="w-full sketch-button bg-slate-800 text-white p-4 font-bold mt-2 shadow-lg active:translate-y-1">Next Page 📖</button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
